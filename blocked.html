<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Blocked</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-content: center;
        gap: 0.4rem;
        text-align: center;
        font: 16px/1.6 system-ui, sans-serif;
        background: #111;
        color: #eee;
        animation: fade 0.5s ease;
      }
      @keyframes fade { from { opacity: 0; transform: translateY(6px); } }

      /* breathing circle — inhale on expand, exhale on shrink */
      .breathe {
        width: 120px;
        height: 120px;
        margin: 0 auto 2.2rem;
        border-radius: 50%;
        display: grid;
        place-content: center;
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 0 60px rgba(120, 160, 255, 0.15);
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        opacity: 0.7;
        animation: breathe 10s ease-in-out infinite;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(0.72); }
        45%, 55% { transform: scale(1.15); }
      }
      .breathe span { animation: label 10s ease-in-out infinite; }
      @keyframes label { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }

      h1 { font-size: 2rem; margin: 0; }
      p { opacity: 0.55; margin: 0; }
      blockquote {
        margin: 1.8rem auto 0;
        max-width: 30rem;
        font-style: italic;
        opacity: 0.7;
      }
      blockquote cite { display: block; margin-top: 0.4rem; font-size: 0.8rem; opacity: 0.6; font-style: normal; }
      #nudge { margin-top: 1.6rem; font-size: 0.9rem; opacity: 0.75; }
      #stat { margin-top: 2.4rem; font-size: 0.78rem; opacity: 0.32; letter-spacing: 0.03em; }
    </style>
  </head>
  <body>
    <div class="breathe"><span>breathe</span></div>
    <h1 id="head">Nope.</h1>
    <p id="sub">You took the exit.</p>
    <blockquote id="quote"></blockquote>
    <p id="nudge"></p>
    <div id="stat"></div>

    <script src="blocked.js"></script>
  </body>
</html>
