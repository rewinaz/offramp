<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        --line: color-mix(in srgb, currentColor 15%, transparent);
        --muted: color-mix(in srgb, currentColor 55%, transparent);
      }
      body {
        width: 300px;
        margin: 0;
        font: 15px/1.2 system-ui, sans-serif;
      }
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px 12px;
        border-bottom: 1px solid var(--line);
      }
      header svg { flex: none; }
      h1 {
        font-size: 20px;
        font-weight: 500;
        margin: 0;
        flex: 1;
      }
      #power {
        appearance: none;
        border: 0;
        padding: 0;
        background: none;
        color: var(--muted);
        cursor: pointer;
      }
      #power:hover { color: inherit; }
      #list { padding: 6px 16px; }
      label {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 9px 0;
        cursor: pointer;
      }
      /* toggle: a checkbox with the box drawn as a pill + ::before knob */
      input[type="checkbox"] {
        appearance: none;
        flex: none;
        margin: 0;
        width: 34px;
        height: 20px;
        border-radius: 10px;
        background: #c4c4c4;
        transition: background 0.15s;
        cursor: pointer;
      }
      input[type="checkbox"]::before {
        content: "";
        display: block;
        width: 16px;
        height: 16px;
        margin: 2px;
        border-radius: 50%;
        background: #fff;
        transition: transform 0.15s;
      }
      input[type="checkbox"]:checked { background: #2f7cf6; }
      input[type="checkbox"]:checked::before { transform: translateX(14px); }
      #custom {
        padding: 8px 16px 4px;
        border-top: 1px solid var(--line);
      }
      h2 {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        margin: 4px 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .add { display: flex; flex-direction: column; gap: 6px; }
      .add-row { display: flex; gap: 8px; }
      #name,
      #url {
        flex: 1;
        min-width: 0;
        padding: 6px 9px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        font: inherit;
      }
      #addBtn {
        flex: none;
        padding: 6px 14px;
        border: 0;
        border-radius: 6px;
        background: #2f7cf6;
        color: #fff;
        font: inherit;
        cursor: pointer;
      }
      .custom-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 9px 0;
      }
      #customList { margin-top: 4px; }
      .custom-row .label {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        line-height: 1.35;
      }
      .custom-row .label span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .custom-row .label .host { font-size: 11px; opacity: 0.5; }
      .custom-row button {
        flex: none;
        appearance: none;
        border: 0;
        background: none;
        color: var(--muted);
        font-size: 18px;
        line-height: 1;
        padding: 0 4px;
        cursor: pointer;
      }
      .custom-row button:hover { color: #e0245e; }
      footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-top: 1px solid var(--line);
        font-size: 12px;
        color: var(--muted);
      }
      footer a {
        color: var(--muted);
        text-decoration: none;
        white-space: nowrap;
      }
      footer a:hover { color: #2f7cf6; }
    </style>
  </head>
  <body>
    <header>
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
        <defs>
          <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#3b82f6" />
            <stop offset="1" stop-color="#1d4ed8" />
          </linearGradient>
        </defs>
        <rect width="32" height="32" rx="8.5" fill="url(#mark)" />
        <path d="M12 27.5 V5" stroke="#fff" stroke-opacity=".38" stroke-width="3.4" stroke-linecap="round" />
        <path d="M12 20.5 C 12 14.5, 15 11.8, 19.4 9.2" stroke="#fff" stroke-width="3.4" />
        <path d="M23.8 6.6 L19.2 12.2 L18 5.2 Z" fill="#fff" />
      </svg>
      <h1>Offramp</h1>
      <button id="power" title="Toggle everything">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12 3v9" />
          <path d="M6.2 6.2a8 8 0 1 0 11.6 0" />
        </svg>
      </button>
    </header>
    <div id="list"></div>
    <div id="custom">
      <h2>Custom sites</h2>
      <div class="add">
        <input id="name" type="text" placeholder="Name (optional)" />
        <div class="add-row">
          <input id="url" type="text" placeholder="reddit.com" />
          <button id="addBtn">Add</button>
        </div>
      </div>
      <div id="customList"></div>
    </div>
    <footer>
      <span>Taking the exit.</span>
      <a id="statsLink" href="#" target="_blank">View stats →</a>
    </footer>
    <script src="dist/popup.js"></script>
  </body>
</html>
