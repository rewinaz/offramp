<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Offramp — Stats</title>
    <style>
      :root {
        --bg: #0b0d11;
        --card: #14171d;
        --line: rgba(255, 255, 255, 0.08);
        --text: #eef1f6;
        --muted: #8f97a6;
        --accent: #3b82f6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
        display: flex;
        justify-content: center;
        padding: 56px 24px 72px;
      }
      .wrap { width: 100%; max-width: 680px; }
      header { display: flex; align-items: center; gap: 13px; margin-bottom: 8px; }
      header h1 { font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
      .sub { color: var(--muted); margin: 0 0 34px; font-size: 14.5px; }

      .tiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .tile {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px 22px;
      }
      .tile .val { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
      .tile .lbl { color: var(--muted); font-size: 13px; margin-top: 5px; }

      .chart {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 22px 22px 16px;
        margin-top: 14px;
      }
      .chart h2 { font-size: 13px; font-weight: 600; color: var(--muted); margin: 0 0 18px;
        text-transform: uppercase; letter-spacing: 0.05em; }
      .chart svg { display: block; width: 100%; height: auto; }
      .chart text { font-family: inherit; }
      .chart .lbl { fill: var(--muted); font-size: 11px; }
      .chart .lbl.today { fill: var(--accent); font-weight: 600; }
      .chart .num { fill: var(--text); font-size: 11px; opacity: 0.8; }

      .sites { display: flex; flex-direction: column; gap: 13px; }
      .site { display: grid; grid-template-columns: 118px 1fr 30px; align-items: center; gap: 12px; }
      .site .sl { font-size: 13.5px; color: var(--text); }
      .site .strack { height: 10px; border-radius: 6px; background: rgba(255, 255, 255, 0.06); }
      .site .sfill { height: 100%; border-radius: 6px; min-width: 6px;
        background: linear-gradient(90deg, #3b82f6, #1d4ed8); }
      .site .sn { text-align: right; font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }

      .note { color: var(--muted); font-size: 12.5px; margin-top: 22px; line-height: 1.55; }
      .empty { text-align: center; color: var(--muted); padding: 60px 0; }
      .empty .big { font-size: 40px; margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#3b82f6" /><stop offset="1" stop-color="#1d4ed8" />
            </linearGradient>
          </defs>
          <rect width="32" height="32" rx="8.5" fill="url(#g)" />
          <path d="M12 27.5 V5" stroke="#fff" stroke-opacity=".38" stroke-width="3.4" stroke-linecap="round" />
          <path d="M12 20.5 C 12 14.5, 15 11.8, 19.4 9.2" stroke="#fff" stroke-width="3.4" />
          <path d="M23.8 6.6 L19.2 12.2 L18 5.2 Z" fill="#fff" />
        </svg>
        <h1>Your stats</h1>
      </header>
      <p class="sub">Every feed you didn't fall into.</p>
      <div id="body"></div>
    </div>
    <script src="stats-lib.js"></script>
    <script src="stats.js"></script>
  </body>
</html>
